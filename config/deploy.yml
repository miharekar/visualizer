# Name of your application. Used to uniquely configure containers.
service: visualizer

# Name of the container image.
image: mrfoto/visualizer

# Deploy to these servers.
servers:
  web:
    hosts:
      - 78.47.79.8
  job:
    hosts:
      - 78.47.79.8
    cmd: bin/sidekiq

registry:
  username: mrfoto
  password:
    - MRSK_REGISTRY_PASSWORD

env:
  clear:
    REDIS_URL: "redis://10.1.0.2:6379/0"
    CACHE_REDIS_URL: "redis://10.1.0.2:6380/0"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL

builder:
  multiarch: false

accessories:
  db:
    image: postgres:15
    hosts:
      - 5.75.162.200
    port: 5432:5432
    env:
      clear:
        POSTGRES_DB: visualizer
      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
    volumes:
      - /data/postgres:/var/lib/postgresql/data
  redis-main:
    image: redis:7.0
    hosts:
      - 5.75.162.200
    port: 6379:6379
    volumes:
      - /data/redis/main:/data
  redis-cache:
    image: redis:7.0
    hosts:
      - 5.75.162.200
    port: 6380:6379
    volumes:
      - /data/redis/cache:/data
    cmd: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
